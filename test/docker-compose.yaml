# MinIO for Drift integration tests.
#
# Bring up:    docker compose up -d
# Tear down:   docker compose down -v
# Endpoint:    http://127.0.0.1:9000
# Console:     http://127.0.0.1:9001
# Credentials: drift-test / drift-test-secret
# Test bucket: drift-test (auto-created by the `init-bucket` job)

services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: drift-test
      MINIO_ROOT_PASSWORD: drift-test-secret
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
    tmpfs:
      - /data
    # No persistent volume — tests should be reproducible from scratch.

  init-bucket:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set drift http://minio:9000 drift-test drift-test-secret &&
      mc mb --ignore-existing drift/drift-test &&
      echo 'bucket ready'
      "
    restart: "no"
