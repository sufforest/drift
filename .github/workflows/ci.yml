name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: build + unit tests
    # ubuntu-latest is unlimited free for public repos; macos-latest
    # consumes the per-account macOS quota at 10x cost and can block
    # CI when exhausted. macOS-specific code is exercised by the
    # local dev workflow and re-added here only at release-cut time
    # via a separate workflow.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test (unit)
        run: go test -race -count=1 ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  integration:
    name: minio integration tests
    runs-on: ubuntu-latest
    services:
      minio:
        image: minio/minio:latest
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -fsS http://localhost:9000/minio/health/live || exit 1"
          --health-interval 5s
          --health-retries 12
        # MinIO's official image runs `minio server` when invoked with
        # no args; the entrypoint expects a data dir. Pass it here:
        # github actions service containers don't support `args:` so
        # we rely on the default healthcheck loop above and start a
        # bucket via a step below.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: install mc + create bucket
        run: |
          curl -sSL -o /tmp/mc https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x /tmp/mc
          /tmp/mc alias set local http://localhost:9000 minioadmin minioadmin
          /tmp/mc mb local/drift-test || true
      - name: integration tests
        env:
          DRIFT_INTEGRATION_ENDPOINT: http://localhost:9000
          DRIFT_INTEGRATION_BUCKET: drift-test
          DRIFT_INTEGRATION_ACCESS_KEY: minioadmin
          DRIFT_INTEGRATION_SECRET_KEY: minioadmin
        run: go test -tags=integration -count=1 ./...
