version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
    - gosec
  settings:
    revive:
      rules:
        - name: var-naming
        - name: package-comments
        - name: exported
          disabled: true
    gosec:
      excludes:
        - G304 # file inclusion via variable — many legitimate uses in CLI tools
